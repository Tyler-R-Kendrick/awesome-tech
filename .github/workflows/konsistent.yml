name: konsistent

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: konsistent-${{ github.ref }}
  cancel-in-progress: true

env:
  # Suppress the interactive "a new version is available" prompt in CI.
  KONSISTENT_NO_UPDATE_CHECK: "true"

jobs:
  check:
    name: Structural conventions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Fail fast on a malformed konsistent.json before running the checks.
      - name: Validate konsistent config
        run: bun run konsistent validate

      # konsistent auto-detects GitHub Actions and emits inline ::error / ::warning
      # annotations on the PR diff; errors fail this job.
      - name: Enforce structural conventions
        run: bun run konsistent
